version: "3"

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  backend:
    image: amanshishodia/trackly-backend:latest
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/trackly
      - JWT_SECRET=your_secret
      - CLIENT_URL=http://localhost:80
    depends_on:
      - mongodb

  frontend:
    image: amanshishodia/trackly-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
