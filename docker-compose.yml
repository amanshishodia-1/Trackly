services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - linear-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=trackly

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linear-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://admin:password@mongodb:27017/trackly?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - linear-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linear-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
      - VITE_SOCKET_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - linear-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  linear-network:
    driver: bridge
