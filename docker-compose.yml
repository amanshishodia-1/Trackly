services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - trackly-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trackly-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/trackly
      - JWT_SECRET=change_this_to_a_secure_key_in_production
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://trackly
    depends_on:
      - mongodb
    networks:
      - trackly-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trackly-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - trackly-network

volumes:
  mongo-data:

networks:
  trackly-network:
    driver: bridge
