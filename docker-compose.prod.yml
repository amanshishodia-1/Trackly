services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - trackly-network

  backend:
    image: amanshishodia/trackly-backend:latest
    container_name: trackly-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/trackly
      - JWT_SECRET=your_secret
      - CLIENT_URL=http://51.21.201.213
    depends_on:
      - mongodb
    networks:
      - trackly-network

  frontend:
    image: amanshishodia/trackly-frontend:latest
    container_name: trackly-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - trackly-network

volumes:
  mongo-data:

networks:
  trackly-network:
    driver: bridge
